<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo + Pomodoro</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Todo <span class="amp">&amp;</span> Pomodoro</h1>
    </header>

    <section class="pomodoro">
      <div class="timer-display">
        <div class="progress-ring">
          <svg width="200" height="200">
            <circle class="bg" cx="100" cy="100" r="88" />
            <circle class="fg" cx="100" cy="100" r="88" />
          </svg>
          <div class="time-text" id="timer">25:00</div>
        </div>
      </div>
      <div class="phase-label" id="phase">Focus</div>
      <div class="timer-controls">
        <button id="startBtn">Start</button>
        <button id="resetBtn">Reset</button>
        <button id="pipBtn" title="Pin timer on top">Pin</button>
      </div>
      <div class="session-count">
        Sessions completed: <span id="sessionCount">0</span>
      </div>
    </section>

    <section class="todo">
      <h2>Tasks</h2>
      <form id="todoForm">
        <input type="text" id="todoInput" placeholder="Add a new task... use #tag to tag" required>
        <button type="submit">Add</button>
      </form>
      <div id="tagCloud"></div>
      <ul id="todoList"></ul>
      <div class="todo-stats">
        <span id="taskCount">0</span> tasks remaining
      </div>
    </section>

    <section class="stats">
      <div class="stats-header">
        <h2>Statistics</h2>
        <div class="view-tabs" id="viewTabs">
          <button class="active" data-view="calendar">Calendar</button>
          <button data-view="hours">Hours</button>
          <button data-view="slots">Slots</button>
        </div>
      </div>
      <div id="statsContent"></div>
    </section>
  </div>

  <template id="pipTemplate">
    <div class="pip-timer">
      <div class="pip-time" id="pipTime">25:00</div>
      <div class="pip-phase" id="pipPhase">Focus</div>
    </div>
  </template>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
