<style>
        .timer-ring {
            transition: stroke-dashoffset 0.5s ease-in-out;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        .soft-glow {
            filter: drop-shadow(0 0 15px rgba(174, 47, 52, 0.2));
        }
        .organic-patch {
            border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
        }
        .pulse-slow {
            animation: pulse-ring 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.2; transform: scale(1.05); }
        }
        .stitch-border {
            border: 2px dashed rgba(174, 47, 52, 0.3);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen font-body-md selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
<!-- Top Navigation -->
<nav class="w-full top-0 flex justify-between items-center px-container-padding py-4 w-full bg-background dark:bg-background z-50">
<div class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed-dim">PomoDone</div>
<div class="flex items-center gap-6">
<div class="hidden md:flex gap-8">
<a class="font-body-md text-body-md text-primary dark:text-primary-fixed-dim border-b-2 border-primary transition-all duration-300" href="#">Pomodoro</a>
<a class="font-body-md text-body-md text-on-surface-variant hover:bg-surface-container-low transition-all duration-300" href="#">Tasks</a>
<a class="font-body-md text-body-md text-on-surface-variant hover:bg-surface-container-low transition-all duration-300" href="#">Stats</a>
</div>
<button class="material-symbols-outlined text-primary hover:bg-surface-container-low p-2 rounded-full transition-all" data-icon="dark_mode">dark_mode</button>
<button class="material-symbols-outlined text-primary hover:bg-surface-container-low p-2 rounded-full transition-all" data-icon="add">add</button>
</div>
</nav>
<main class="relative flex flex-col items-center justify-center min-h-[calc(100vh-80px)] px-container-padding pb-24">
<!-- Background Atmospheric Element -->
<div class="fixed inset-0 pointer-events-none overflow-hidden opacity-30">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-container rounded-full blur-[120px]"></div>
<div class="absolute bottom-48 -right-24 w-80 h-80 bg-secondary-container rounded-full blur-[100px]"></div>
</div>
<!-- Timer Header Phase -->
<div class="mb-8 text-center animate-fade-in">
<div class="inline-flex items-center gap-2 px-4 py-1 bg-primary-container/10 text-primary rounded-full mb-2">
<span class="w-2 h-2 bg-primary rounded-full animate-pulse"></span>
<span class="font-label-caps text-label-caps tracking-widest uppercase">Focus Time</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface">Stay Present</h1>
</div>
<!-- The Gravity Center: Timer Ring -->
<div class="relative w-[320px] h-[320px] md:w-[420px] md:h-[420px] flex items-center justify-center">
<!-- Pulsing Backglow -->
<div class="absolute inset-0 organic-patch bg-primary/5 pulse-slow"></div>
<!-- SVG Progress Ring -->
<svg class="w-full h-full transform -rotate-90">
<circle class="text-surface-container-high" cx="50%" cy="50%" fill="transparent" r="45%" stroke="currentColor" stroke-width="8"></circle>
<circle class="text-primary timer-ring soft-glow" cx="50%" cy="50%" fill="transparent" r="45%" stroke="currentColor" stroke-dasharray="1000" stroke-dashoffset="250" stroke-linecap="round" stroke-width="12"></circle>
</svg>
<!-- Inner Circle UI -->
<div class="absolute inset-0 flex flex-col items-center justify-center">
<div class="font-display-timer text-display-timer text-primary mb-4 tabular-nums" id="timer-display">25:00</div>
<button class="bg-primary hover:bg-primary/90 text-on-primary px-10 py-4 rounded-full font-headline-md text-headline-md shadow-lg active:scale-95 transition-all duration-300 flex items-center gap-3 group" id="main-action">
<span class="material-symbols-outlined" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
<span>Start</span>
</button>
</div>
</div>
<!-- Active Task Card (The "Patch") -->
<div class="mt-12 w-full max-w-md bg-surface-container-low rounded-lg p-6 shadow-sm relative overflow-hidden group">
<div class="absolute left-0 top-0 bottom-0 w-1.5 bg-primary"></div>
<div class="flex justify-between items-start mb-4">
<div>
<span class="font-label-caps text-label-caps text-primary mb-1 block">Active Task</span>
<h2 class="font-headline-md text-headline-md text-on-surface">Design System V2 Refinement</h2>
</div>
<button class="material-symbols-outlined text-outline hover:text-primary transition-colors" data-icon="more_vert">more_vert</button>
</div>
<div class="flex flex-wrap gap-2">
<span class="px-3 py-1 bg-secondary-container/30 text-on-secondary-container rounded-full text-sm font-medium">#Product</span>
<span class="px-3 py-1 bg-surface-container-high text-on-surface-variant rounded-full text-sm font-medium">Design</span>
<span class="ml-auto text-outline font-label-caps text-label-caps flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]" data-icon="history">history</span>
                    2/4 Pomo
                </span>
</div>
</div>
<!-- Secondary Controls -->
<div class="mt-8 flex items-center gap-6">
<button class="w-12 h-12 flex items-center justify-center rounded-full stitch-border text-primary hover:bg-primary/5 transition-all active:scale-90" title="Pause">
<span class="material-symbols-outlined" data-icon="pause">pause</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full stitch-border text-primary hover:bg-primary/5 transition-all active:scale-90" title="Reset">
<span class="material-symbols-outlined" data-icon="refresh">refresh</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full stitch-border text-primary hover:bg-primary/5 transition-all active:scale-90" title="Picture in Picture">
<span class="material-symbols-outlined" data-icon="picture_in_picture_alt">picture_in_picture_alt</span>
</button>
</div>
</main>
<!-- Global Progress Bar / Footer -->
<footer class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-container-padding py-3 bg-primary-container dark:bg-primary-fixed shadow-lg rounded-t-lg">
<div class="flex items-center gap-4">
<div class="font-label-caps text-label-caps font-bold text-on-primary-container dark:text-on-primary-fixed">PomoDone - Active Task Progress</div>
<div class="hidden md:flex h-1.5 w-48 bg-on-primary-container/20 rounded-full overflow-hidden">
<div class="h-full bg-on-primary-container w-[65%] rounded-full"></div>
</div>
</div>
<div class="flex items-center gap-6">
<button class="font-label-caps text-label-caps text-on-primary-container hover:bg-primary dark:hover:bg-primary-fixed-dim hover:text-on-primary px-3 py-1 rounded transition-all animate-pulse">Pause</button>
<button class="font-label-caps text-label-caps text-on-primary-container hover:bg-primary dark:hover:bg-primary-fixed-dim hover:text-on-primary px-3 py-1 rounded transition-all">Stop</button>
</div>
</footer>
<script>
        // Micro-interactions and Timer Logic
        let timerSeconds = 25 * 60;
        let isRunning = false;
        let interval;

        const display = document.getElementById('timer-display');
        const mainBtn = document.getElementById('main-action');
        const ring = document.querySelector('.timer-ring');
        
        // Ring Circumference (2 * PI * R) where R = 45% of width
        // Assuming SVG viewBox or calculated width
        const totalCircumference = 1130; // approx for 420px ring
        ring.style.strokeDasharray = totalCircumference;

        function updateDisplay() {
            const mins = Math.floor(timerSeconds / 60);
            const secs = timerSeconds % 60;
            display.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            const progress = (25 * 60 - timerSeconds) / (25 * 60);
            ring.style.strokeDashoffset = totalCircumference * progress;
        }

        mainBtn.addEventListener('click', () => {
            isRunning = !isRunning;
            const icon = mainBtn.querySelector('.material-symbols-outlined');
            const label = mainBtn.querySelector('span:not(.material-symbols-outlined)');
            
            if (isRunning) {
                icon.textContent = 'pause';
                label.textContent = 'Pause';
                interval = setInterval(() => {
                    if (timerSeconds > 0) {
                        timerSeconds--;
                        updateDisplay();
                    } else {
                        clearInterval(interval);
                        isRunning = false;
                        icon.textContent = 'play_arrow';
                        label.textContent = 'Start';
                    }
                }, 1000);
            } else {
                icon.textContent = 'play_arrow';
                label.textContent = 'Start';
                clearInterval(interval);
            }
        });

        // Initialize display
        updateDisplay();
    </script>
</body></html>
